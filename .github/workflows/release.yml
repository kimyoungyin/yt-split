name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            sidecar_cmd: bash pyinstaller/build.sh
          - os: macos-13
            target: x86_64-apple-darwin
            sidecar_cmd: bash pyinstaller/build.sh
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_cmd: bash pyinstaller/build.sh
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_cmd: pwsh pyinstaller/build.ps1

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install FFmpeg + Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target/release
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: ui/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('ui/pnpm-lock.yaml') }}

      # 태그(v0.1.0)에서 버전을 추출해 tauri.conf.json의 version 필드를 패치한다.
      # 이후 build.sh / build.ps1 이 bundle.resources 만 덮어쓰므로 version은 보존된다.
      - name: Sync app version from tag
        run: |
          python -c "
          import json, os
          version = os.environ['GITHUB_REF_NAME'].lstrip('v')
          with open('src-tauri/tauri.conf.json') as f:
              conf = json.load(f)
          conf['version'] = version
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=4)
              f.write('\n')
          print('version ->', version)
          "

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build sidecar (PyInstaller)
        run: ${{ matrix.sidecar_cmd }}

      - name: Install UI dependencies
        run: pnpm --dir ui install

      - name: Build Tauri app
        run: pnpm build:app

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
