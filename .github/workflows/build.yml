name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            sidecar_cmd: bash pyinstaller/build.sh
          - os: macos-13
            target: x86_64-apple-darwin
            sidecar_cmd: bash pyinstaller/build.sh
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_cmd: bash pyinstaller/build.sh
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_cmd: pwsh pyinstaller/build.ps1

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # FFmpeg: PyInstaller spec의 _ffmpeg_lib_dir()가 탐색하는 시스템 라이브러리
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install FFmpeg + Tauri system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y

      # 캐시: cargo registry + target/release, pnpm node_modules
      # pip는 setup-python의 cache: pip가 플랫폼별 경로를 자동 처리함
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - uses: actions/cache@v4
        with:
          path: ui/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('ui/pnpm-lock.yaml') }}

      # 빌드
      - name: Install Python dependencies
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            pip install torch --index-url https://download.pytorch.org/whl/cpu
          fi
          pip install -r requirements.txt

      - name: Build sidecar (PyInstaller)
        run: ${{ matrix.sidecar_cmd }}

      - name: Install UI dependencies
        run: pnpm --dir ui install

      - name: Build Tauri app
        run: pnpm build:app

      # Artifact 업로드
      - uses: actions/upload-artifact@v4
        with:
          name: yt-split-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: ignore
